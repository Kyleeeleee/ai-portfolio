<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a0d20"/>
      <stop offset="50%" stop-color="#251b35"/>
      <stop offset="100%" stop-color="#3d1b4e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#7c5cfc"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ec4899" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#7c5cfc" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <circle cx="400" cy="200" r="280" fill="url(#glow)"/>
  <!-- Workflow nodes (drag-drop style) -->
  <g>
    <rect x="120" y="120" width="120" height="50" rx="8" fill="#7c5cfc" opacity="0.85"/>
    <text x="180" y="150" text-anchor="middle" fill="#fff" font-size="13" font-family="-apple-system,sans-serif" font-weight="600">Agent A</text>
    <rect x="340" y="120" width="120" height="50" rx="8" fill="#ec4899" opacity="0.85"/>
    <text x="400" y="150" text-anchor="middle" fill="#fff" font-size="13" font-family="-apple-system,sans-serif" font-weight="600">Agent B</text>
    <rect x="560" y="120" width="120" height="50" rx="8" fill="#00e5a0" opacity="0.85"/>
    <text x="620" y="150" text-anchor="middle" fill="#0a0a12" font-size="13" font-family="-apple-system,sans-serif" font-weight="600">API</text>
  </g>
  <!-- Connections -->
  <g stroke="#fff" stroke-width="1.5" opacity="0.4" fill="none">
    <line x1="240" y1="145" x2="340" y2="145"/>
    <line x1="460" y1="145" x2="560" y2="145"/>
  </g>
  <rect x="40" y="40" width="720" height="370" rx="16" fill="none" stroke="url(#accent)" stroke-width="1.5" opacity="0.4"/>
  <!-- Title block at bottom -->
  <text x="400" y="290" text-anchor="middle" fill="#e0e0f0" font-size="48" font-family="-apple-system,sans-serif" font-weight="bold">🤖</text>
  <text x="400" y="335" text-anchor="middle" fill="#e0e0f0" font-size="26" font-family="-apple-system,sans-serif" font-weight="700">GenAI Agent 对话平台</text>
  <text x="400" y="365" text-anchor="middle" fill="#8888aa" font-size="13" font-family="-apple-system,sans-serif">Agent 编排 · 工作流引擎 · API 开放 · Port 8511</text>
  <text x="750" y="60" text-anchor="end" fill="#ec4899" font-size="11" font-family="-apple-system,sans-serif" opacity="0.8">MVP 12 · 铃盛 RingCentral</text>
</svg>
