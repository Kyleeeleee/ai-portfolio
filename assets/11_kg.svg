<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a0d20"/>
      <stop offset="50%" stop-color="#2d1b35"/>
      <stop offset="100%" stop-color="#3d1b4e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7c5cfc"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ec4899" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#ec4899" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <circle cx="400" cy="180" r="260" fill="url(#glow)"/>
  <!-- Knowledge graph nodes & edges (offset up to leave room for text) -->
  <g stroke="#7c5cfc" stroke-width="1.5" opacity="0.6">
    <line x1="400" y1="180" x2="300" y2="105"/>
    <line x1="400" y1="180" x2="500" y2="105"/>
    <line x1="400" y1="180" x2="250" y2="195"/>
    <line x1="400" y1="180" x2="550" y2="195"/>
    <line x1="400" y1="180" x2="400" y2="80"/>
    <line x1="400" y1="180" x2="400" y2="265"/>
  </g>
  <g>
    <circle cx="400" cy="180" r="14" fill="#ec4899" stroke="#fff" stroke-width="2"/>
    <circle cx="300" cy="105" r="8" fill="#7c5cfc"/>
    <circle cx="500" cy="105" r="8" fill="#7c5cfc"/>
    <circle cx="250" cy="195" r="8" fill="#00e5a0"/>
    <circle cx="550" cy="195" r="8" fill="#00e5a0"/>
    <circle cx="400" cy="80" r="8" fill="#7c5cfc"/>
    <circle cx="400" cy="265" r="8" fill="#7c5cfc"/>
  </g>
  <rect x="40" y="40" width="720" height="370" rx="16" fill="none" stroke="url(#accent)" stroke-width="1.5" opacity="0.4"/>
  <!-- Title block at bottom -->
  <rect x="40" y="300" width="720" height="110" rx="0" fill="#0a0a12" opacity="0.4"/>
  <text x="400" y="335" text-anchor="middle" fill="#e0e0f0" font-size="44" font-family="-apple-system,sans-serif" font-weight="bold">🧠</text>
  <text x="400" y="370" text-anchor="middle" fill="#e0e0f0" font-size="26" font-family="-apple-system,sans-serif" font-weight="700">知识图谱可视化</text>
  <text x="400" y="398" text-anchor="middle" fill="#8888aa" font-size="13" font-family="-apple-system,sans-serif">Neo4j · 路径推理 · NLP问答 · Port 8510</text>
  <text x="750" y="60" text-anchor="end" fill="#ec4899" font-size="11" font-family="-apple-system,sans-serif" opacity="0.8">MVP 11 · 渊亭科技</text>
</svg>
