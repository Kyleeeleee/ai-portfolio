<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a1a18"/>
      <stop offset="50%" stop-color="#152525"/>
      <stop offset="100%" stop-color="#1a1535"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00e5a0"/>
      <stop offset="100%" stop-color="#7c5cfc"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00e5a0" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#00e5a0" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <circle cx="400" cy="225" r="280" fill="url(#glow)"/>
  <!-- Simple 3D floorplan outline -->
  <g stroke="#00e5a0" stroke-width="1" fill="none" opacity="0.4">
    <rect x="250" y="120" width="100" height="80"/>
    <rect x="350" y="120" width="200" height="80"/>
    <rect x="250" y="200" width="80" height="80"/>
    <rect x="330" y="200" width="220" height="80"/>
  </g>
  <!-- Device dots -->
  <circle cx="300" cy="160" r="4" fill="#7c5cfc"/>
  <circle cx="450" cy="160" r="4" fill="#7c5cfc"/>
  <circle cx="290" cy="240" r="4" fill="#00e5a0"/>
  <circle cx="450" cy="240" r="4" fill="#00e5a0"/>
  <rect x="40" y="40" width="720" height="370" rx="16" fill="none" stroke="url(#accent)" stroke-width="1.5" opacity="0.4"/>
  <text x="400" y="295" text-anchor="middle" fill="#e0e0f0" font-size="56" font-family="-apple-system,sans-serif" font-weight="bold">🏠</text>
  <text x="400" y="340" text-anchor="middle" fill="#e0e0f0" font-size="28" font-family="-apple-system,sans-serif" font-weight="700">AIoT 智能家居</text>
  <text x="400" y="375" text-anchor="middle" fill="#8888aa" font-size="14" font-family="-apple-system,sans-serif">全屋联动 · 3D户型 · 能耗分析 · Port 8509</text>
  <text x="400" y="420" text-anchor="middle" fill="#00e5a0" font-size="12" font-family="-apple-system,sans-serif" opacity="0.7">MVP 10 · 大白科技</text>
