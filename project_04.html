<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📊 AI自动巡检报告系统 · 李林豪</title>
<style>
:root{--bg:#0a0a12;--card:#12122a;--border:#1e1e44;--primary:#7c5cfc;--accent:#00e5a0;--text:#e0e0f0;--dim:#8888aa;--radius:16px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}
.header{background:linear-gradient(135deg,#1a1525,#2d1b4e);padding:3rem 2rem;text-align:center}
.header .back{display:inline-block;margin-bottom:1rem;color:var(--dim);text-decoration:none;font-size:.85rem;transition:color .3s}
.header .back:hover{color:var(--primary)}
.header .emoji{font-size:3rem;margin-bottom:.5rem}
.header h1{font-size:2.2rem;font-weight:800;margin-bottom:.3rem}
.header .subtitle{color:var(--dim);font-size:1rem}
.container{max-width:860px;margin:0 auto;padding:2rem}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:2rem;margin-bottom:1.5rem}
.card h2{font-size:1.15rem;margin-bottom:1rem;display:flex;align-items:center;gap:.5rem}
.card p{font-size:.9rem;color:var(--dim);line-height:1.8}
.features{list-style:none;padding:0}
.features li{position:relative;padding:.5rem 0 .5rem 1.5rem;font-size:.9rem;color:var(--text)}
.features li::before{content:"▸";position:absolute;left:0;color:var(--primary)}
.tags{display:flex;flex-wrap:wrap;gap:.4rem;margin-top:1rem}
.tag{font-size:.75rem;padding:4px 12px;border-radius:20px;background:rgba(139,92,246,0.12);color:var(--primary);border:1px solid rgba(139,92,246,0.2)}
.tag-green{background:rgba(0,229,160,0.1);color:var(--accent);border-color:rgba(0,229,160,0.2)}
.meta{display:flex;gap:1.5rem;flex-wrap:wrap;font-size:.82rem;color:var(--dim);margin-top:.8rem}
.metric-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:1rem;margin-top:1rem}
.metric{border:1px solid var(--border);border-radius:12px;padding:1rem;background:rgba(255,255,255,.03)}
.metric strong{display:block;font-size:1.35rem;color:var(--text);line-height:1}
.metric span{display:block;color:var(--dim);font-size:.78rem;margin-top:.45rem}
.nav{display:flex;justify-content:space-between;align-items:center;margin-top:2rem;padding:1rem 0;border-top:1px solid var(--border)}
.nav a{color:var(--primary);text-decoration:none;font-size:.9rem;transition:color .3s}
.nav a:hover{color:var(--accent)}
.footer{text-align:center;padding:2rem;color:var(--dim);font-size:.8rem;border-top:1px solid var(--border);margin-top:2rem}
.footer a{color:var(--primary);text-decoration:none}
.note{font-size:.78rem;color:var(--dim);margin-top:.8rem}
@media(max-width:640px){.header h1{font-size:1.5rem}.card{padding:1.25rem}.metric-grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<div class="header">
  <a href="projects.html" class="back">← 返回项目列表</a>
  <div class="emoji">📊</div>
  <h1>AI自动巡检报告系统</h1>
  <div class="subtitle">自动化巡检 · AI异常检测 · 报告生成</div>
</div>

<div class="container">
