<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🧠 知识图谱平台 · 在线Demo</title>
<style>
:root{--bg:#0c0c1d;--card:#151530;--border:#252550;--primary:#a78bfa;--accent:#f472b6;--text:#e0e0f0;--dim:#7878a0;--radius:14px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.header{background:linear-gradient(135deg,#0c0c1d,#1a1040);padding:1.2rem 2rem;text-align:center;border-bottom:1px solid var(--border)}
.header h1{font-size:1.3rem;font-weight:700}
.header .sub{font-size:.82rem;color:var(--dim);margin-top:4px}
.layout{display:grid;grid-template-columns:300px 1fr;gap:1rem;padding:1rem;max-width:1400px;margin:0 auto;height:calc(100vh - 110px)}
.panel{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1rem;overflow-y:auto}
.search-box{width:100%;padding:10px 16px;border-radius:20px;border:1px solid var(--border);background:rgba(255,255,255,.06);color:var(--text);font-size:.85rem;outline:none;margin-bottom:12px}
.search-box:focus{border-color:var(--primary)}
.graph-svg{width:100%;height:100%;min-height:400px}
.node{fill:var(--primary);cursor:pointer;transition:fill .3s}
.node:hover{fill:var(--accent)}
.node.center{fill:var(--accent)}
.edge{stroke:#7878a0;stroke-width:1.5}
.edge-label{fill:var(--dim);font-size:9px}
.node-label{fill:var(--text);font-size:11px;text-anchor:middle;pointer-events:none}
.entity-list{display:flex;flex-direction:column;gap:6px}
.entity-item{padding:10px 14px;border-radius:10px;background:rgba(255,255,255,.03);border:1px solid var(--border);cursor:pointer;transition:all .2s;font-size:.85rem}
.entity-item:hover{border-color:var(--primary);background:rgba(167,139,250,.06)}
.entity-item .type{display:inline-block;font-size:.65rem;padding:1px 8px;border-radius:8px;margin-right:6px}
.type-company{background:rgba(167,139,250,.15);color:var(--primary)}
.type-person{background:rgba(244,114,182,.15);color:var(--accent)}
.type-product{background:rgba(52,211,153,.15);color:#34d399}
.type-tech{background:rgba(251,191,36,.15);color:#fbbf24}
.detail-card{background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:10px;padding:14px;margin-top:10px;font-size:.85rem;line-height:1.6}
.relation{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:.8rem}
.relation .rel-type{color:var(--accent);font-weight:600;min-width:50px}
@media(max-width:768px){.layout{grid-template-columns:1fr;height:auto}}
</style>
</head>
<body>
<div class="header">
  <h1>🧠 知识图谱可视化平台</h1>
  <div class="sub">实体关系抽取 · 图谱可视化 · 智能问答</div>
</div>
<div class="layout">
  <div class="panel">
    <input class="search-box" placeholder="🔍 搜索实体名称..." oninput="filterEntities(this.value)">
    <div style="font-size:.82rem;color:var(--dim);margin-bottom:10px">已构建 1,247 个实体 · 3,892 条关系</div>
    <div class="entity-list" id="entityList"></div>
  </div>
  <div class="panel">
    <svg class="graph-svg" id="graphSvg" viewBox="0 0 700 500"></svg>
    <div class="detail-card" id="detailPanel">
      <div style="color:var(--dim)">点击左侧实体或图中节点查看详情</div>
    </div>
  </div>
</div>
<script>
const entities=[
  {id:"apple",name:"Apple Inc.",type:"company",x:400,y:120,desc:"全球消费电子与AI技术领导者"},
  {id:"nvidia",name:"NVIDIA",type:"company",x:550,y:220,desc:"GPU/AI芯片全球市场份额超80%"},
  {id:"openai",name:"OpenAI",type:"company",x:300,y:280,desc:"GPT系列大模型开创者·ChatGPT月活超3亿"},
  {id:"sam",name:"Sam Altman",type:"person",x:200,y:180,desc:"OpenAI CEO·前Y Combinator总裁"},
  {id:"huang",name:"黄仁勋",type:"person",x:500,y:100,desc:"NVIDIA创始人兼CEO·AI时代关键人物"},
  {id:"gpt5",name:"GPT-5",type:"product",x:250,y:380,desc:"下一代多模态大语言模型"},
  {id:"blackwell",name:"Blackwell B200",type:"product",x:600,y:340,desc:"下一代AI超级芯片·2080亿晶体管"},
  {id:"h100",name:"H100 Tensor Core",type:"product",x:500,y:400,desc:"当前AI训练主力GPU"},
  {id:"transformer",name:"Transformer架构",type:"tech",x:350,y:420,desc:"现代大模型基础架构·2017年提出"},
  {id:"cuda",name:"CUDA生态",type:"tech",x:600,y:150,desc:"NVIDIA并行计算平台"},
];
const relations=[
  {from:"sam",to:"openai",label:"CEO"}, {from:"huang",to:"nvidia",label:"CEO"},
  {from:"openai",to:"gpt5",label:"研发"}, {from:"nvidia",to:"h100",label:"生产"},
  {from:"nvidia",to:"blackwell",label:"下一代"}, {from:"nvidia",to:"cuda",label:"提供"},
  {from:"gpt5",to:"transformer",label:"基于"}, {from:"openai",to:"apple",label:"合作"},
  {from:"apple",to:"nvidia",label:"采购GPU"}, {from:"h100",to:"cuda",label:"运行"},
  {from:"sam",to:"apple",label:"合作谈判"}, {from:"huang",to:"openai",label:"供应GPU"},
];

function renderGraph(){
  const svg=document.getElementById("graphSvg");
  let html='<defs><marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#7878a0"/></marker></defs>';
  
  // 边先画
  relations.forEach(r=>{
    const f=entities.find(e=>e.id===r.from), t=entities.find(e=>e.id===r.to);
    if(!f||!t)return;
    const mx=(f.x+t.x)/2, my=(f.y+t.y)/2;
    html+=`<line x1="${f.x}" y1="${f.y}" x2="${t.x}" y2="${t.y}" class="edge" marker-end="url(#arrow)"/>`;
    html+=`<text x="${mx}" y="${my-4}" class="edge-label" text-anchor="middle">${r.label}</text>`;
  });
  
  // 节点
  entities.forEach(e=>{
    html+=`<circle cx="${e.x}" cy="${e.y}" r="22" class="node${e.id===document.activeEntity?' center':''}" onclick="selectEntity('${e.id}')"/>`;
    html+=`<text x="${e.x}" y="${e.y-28}" class="node-label">${e.name.length>8?e.name.slice(0,8)+'..':e.name}</text>`;
  });
  
  svg.innerHTML=html;
}

let activeEntity=null;
function selectEntity(id){
  activeEntity=id;
  const e=entities.find(x=>x.id===id);
  if(!e)return;
  document.getElementById("detailPanel").innerHTML=`
    <strong style="font-size:1rem">${e.name}</strong>
    <span class="type type-${e.type}" style="margin-left:8px">${e.type==='company'?'企业':e.type==='person'?'人物':e.type==='product'?'产品':'技术'}</span>
    <p style="margin-top:8px;color:var(--dim)">${e.desc}</p>
    <div style="margin-top:10px"><strong style="font-size:.8rem;color:var(--accent)">关联关系：</strong></div>
    ${relations.filter(r=>r.from===id||r.to===id).map(r=>{
      const other=entities.find(x=>x.id===(r.from===id?r.to:r.from));
      return `<div class="relation"><span class="rel-type">${r.label}</span> → ${other?other.name:'?'}</div>`;
    }).join("")}
  `;
  renderGraph();
}
function filterEntities(q){
  const list=document.getElementById("entityList");
  const filtered=q?entities.filter(e=>e.name.toLowerCase().includes(q.toLowerCase())):entities;
  list.innerHTML=filtered.map(e=>`
    <div class="entity-item" onclick="selectEntity('${e.id}')">
      <span class="type type-${e.type}">${e.type==='company'?'企':e.type==='person'?'人':e.type==='product'?'产':'技'}</span>
      ${e.name}
    </div>
  `).join("");
}
filterEntities("");
renderGraph();
</script>
</body>
</html>
