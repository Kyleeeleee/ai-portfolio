<style>
:root{--bg:#0a0a12;--card:#12122a;--border:#26264f;--primary:#7c5cfc;--accent:#00e5a0;--text:#e0e0f0;--dim:#9292b2;--radius:16px}
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;background:radial-gradient(circle at 20% 15%,rgba(124,92,252,.22),transparent 32%),radial-gradient(circle at 80% 82%,rgba(0,229,160,.12),transparent 28%),var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC",sans-serif;display:grid;place-items:center;padding:24px;line-height:1.6}
.panel{width:min(620px,100%);border:1px solid var(--border);border-radius:var(--radius);background:rgba(18,18,42,.86);box-shadow:0 20px 70px rgba(0,0,0,.28);padding:32px;text-align:center}
.icon{font-size:44px;margin-bottom:12px}
h1{font-size:clamp(26px,5vw,42px);line-height:1.15;margin-bottom:10px}
p{color:var(--dim);font-size:15px;margin-bottom:22px}
.actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
a{display:inline-flex;align-items:center;justify-content:center;min-height:44px;padding:0 18px;border-radius:999px;text-decoration:none;font-weight:760;font-size:14px}
.primary{background:linear-gradient(135deg,var(--primary),#6366f1);color:white}
.secondary{border:1px solid var(--border);color:var(--text);background:rgba(255,255,255,.04)}
.url{margin-top:18px;color:#6f6f91;font-size:12px;word-break:break-all}
</style>
</head>

  <div class="url">http://159.75.118.205:8509/</div>
