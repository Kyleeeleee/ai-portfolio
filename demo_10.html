<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏠 AIoT智能家居控制台 · 在线Demo</title>
<style>
:root{--bg:#0a0a12;--card:#0f0f1f;--border:rgba(255,255,255,0.06);--primary:#7c5cfc;--accent:#00e5a0;--text:#e0e0f0;--dim:#8888aa;--radius:16px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.header{background:linear-gradient(135deg,#12122a,#2d1b69);padding:1.2rem 2rem;text-align:center;border-bottom:1px solid var(--border)}
.header h1{font-size:1.3rem;font-weight:700}
.header .status{font-size:.78rem;color:var(--accent)}
.layout{display:grid;grid-template-columns:280px 1fr;gap:1rem;padding:1rem;max-width:1400px;margin:0 auto}
.panel{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1.2rem}
.device-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:1rem}
.device-card{background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:12px;padding:14px;cursor:pointer;transition:all .3s;text-align:center}
.device-card:hover{border-color:var(--primary);transform:translateY(-2px)}
.device-card.active{border-color:var(--accent);box-shadow:0 0 20px rgba(52,211,153,.1)}
.device-card .icon{font-size:2rem;margin-bottom:.5rem}
.device-card .name{font-weight:700;font-size:.9rem}
.device-card .state{font-size:.72rem;margin-top:4px}
.state-on{color:var(--accent)}
.state-off{color:var(--dim)}
.toggle-btn{padding:6px 16px;border-radius:20px;border:none;font-size:.75rem;font-weight:600;cursor:pointer;margin-top:8px;transition:all .2s}
.toggle-on{background:var(--accent);color:#0f1923}
.toggle-off{background:rgba(255,255,255,.08);color:var(--dim)}
.stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:12px}
.stat{background:rgba(255,255,255,.03);border-radius:10px;padding:14px;text-align:center}
.stat .val{font-size:1.5rem;font-weight:700;color:var(--primary)}
.stat .lbl{font-size:.72rem;color:var(--dim);margin-top:4px}
.alerts{display:flex;flex-direction:column;gap:6px;max-height:200px;overflow-y:auto}
.alert{padding:8px 12px;border-radius:8px;font-size:.78rem;display:flex;align-items:center;gap:8px}
.alert-warn{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.2)}
.alert-ok{background:rgba(52,211,153,.1);border:1px solid rgba(52,211,153,.2)}
.chart-bar{height:40px;background:linear-gradient(90deg,var(--primary),var(--accent));border-radius:4px;margin:4px 0;transition:width 1s}
@media(max-width:768px){.layout{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="header">
  <h1>🏠 AIoT智能家居控制台</h1>
  <span class="status">🟢 系统运行中 · 24台设备在线</span>
</div>
<div class="layout">
  <div class="panel">
    <h3 style="font-size:.9rem;margin-bottom:12px">⚡ 实时能耗</h3>
    <div class="stats-grid">
      <div class="stat"><div class="val" id="power">3.2<span style="font-size:.8rem">kW</span></div><div class="lbl">当前功率</div></div>
      <div class="stat"><div class="val" id="today">18.5<span style="font-size:.8rem">kWh</span></div><div class="lbl">今日用电</div></div>
      <div class="stat"><div class="val" id="temp">24.5<span style="font-size:.8rem">°C</span></div><div class="lbl">室内温度</div></div>
      <div class="stat"><div class="val" id="humidity">52<span style="font-size:.8rem">%</span></div><div class="lbl">室内湿度</div></div>
    </div>

    <h3 style="font-size:.9rem;margin:16px 0 8px">🔔 实时告警</h3>
    <div class="alerts">
      <div class="alert alert-ok">✅ 所有安防传感器正常</div>
      <div class="alert alert-ok">✅ 网关连接稳定 · 延迟12ms</div>
      <div class="alert alert-warn">⚠️ 客厅空调滤网需清洗 (剩余80%)</div>
    </div>

    <h3 style="font-size:.9rem;margin:16px 0 8px">📊 今日用电分布</h3>
    <div style="font-size:.72rem;display:flex;justify-content:space-between"><span>空调 42%</span><span style="color:var(--primary)">1.3kWh</span></div>
    <div class="chart-bar" style="width:42%"></div>
    <div style="font-size:.72rem;display:flex;justify-content:space-between;margin-top:4px"><span>照明 18%</span><span style="color:var(--primary)">0.6kWh</span></div>
    <div class="chart-bar" style="width:18%;background:linear-gradient(90deg,#f59e0b,#fbbf24)"></div>
    <div style="font-size:.72rem;display:flex;justify-content:space-between;margin-top:4px"><span>电器 25%</span><span style="color:var(--primary)">0.8kWh</span></div>
    <div class="chart-bar" style="width:25%;background:linear-gradient(90deg,#ef4444,#f87171)"></div>
    <div style="font-size:.72rem;display:flex;justify-content:space-between;margin-top:4px"><span>其他 15%</span><span style="color:var(--dim)">0.5kWh</span></div>
    <div class="chart-bar" style="width:15%;background:linear-gradient(90deg,#7e8c9e,#94a3b8)"></div>
  </div>
  <div class="panel">
    <h3 style="font-size:.9rem;margin-bottom:12px">🏠 设备控制</h3>
    <div class="device-grid" id="devices"></div>
  </div>
</div>
<script>
const devices=[
  {icon:"💡",name:"客厅主灯",room:"客厅",on:true,power:"12W"},
  {icon:"🌡️",name:"智能空调",room:"客厅",on:true,power:"1200W"},
  {icon:"📺",name:"智能电视",room:"客厅",on:false,power:"150W"},
  {icon:"🔌",name:"智能插座",room:"书房",on:true,power:"3W"},
  {icon:"💡",name:"书房灯",room:"书房",on:true,power:"9W"},
  {icon:"🚿",name:"热水器",room:"浴室",on:true,power:"2000W"},
  {icon:"🔐",name:"智能门锁",room:"大门",on:true,power:"1W"},
  {icon:"📷",name:"门口摄像头",room:"大门",on:true,power:"5W"},
];
function renderDevices(){
  const grid=document.getElementById("devices");
  grid.innerHTML=devices.map((d,i)=>`
    <div class="device-card ${d.on?'active':''}" onclick="toggle(${i})">
      <div class="icon">${d.icon}</div>
      <div class="name">${d.name}</div>
      <div class="state ${d.on?'state-on':'state-off'}">${d.on?d.power+' · 运行中':'已关闭'}</div>
      <div style="font-size:.7rem;color:var(--dim)">📍 ${d.room}</div>
      <button class="toggle-btn ${d.on?'toggle-on':'toggle-off'}">${d.on?'关闭':'开启'}</button>
    </div>
  `).join("");
}
function toggle(i){
  devices[i].on=!devices[i].on;
  renderDevices();
  document.getElementById("power").innerHTML=(3.2+(devices[i].on?0.3:-0.3)).toFixed(1)+'<span style="font-size:.8rem">kW</span>';
}
renderDevices();
setInterval(()=>{
  document.getElementById("temp").innerHTML=(24.5+Math.random()-.5).toFixed(1)+'<span style="font-size:.8rem">°C</span>';
  document.getElementById("humidity").innerHTML=Math.floor(52+Math.random()*3-1.5)+'<span style="font-size:.8rem">%</span>';
},5000);
</script>
</body>
</html>
