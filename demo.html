<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Demo 在线体验 · 李林豪</title>
<style>
:root{--bg:#f5f5f7;--surface:#fff;--surface-soft:#fbfbfd;--text:#1d1d1f;--muted:#6e6e73;--subtle:#86868b;--line:#d2d2d7;--blue:#0071e3;--blue-deep:#0040dd;--green:#248a3d;--orange:#bf5b00;--red:#c9342f;--purple:#7c5cfc;--cyan:#0a84ff;--shadow:0 18px 42px rgba(0,0,0,.08);--radius:8px;--nav-h:52px}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{min-height:100vh;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","PingFang SC","Microsoft YaHei",Arial,sans-serif;line-height:1.5;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
a{color:inherit;text-decoration:none}
button,input,textarea,select{font:inherit}
.topbar{position:fixed;top:0;left:0;right:0;z-index:50;height:var(--nav-h);background:rgba(251,251,253,.78);border-bottom:1px solid rgba(0,0,0,.08);backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px)}
.topbar-inner{width:min(1120px,calc(100% - 32px));height:100%;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:16px}
.brand{font-size:14px;font-weight:650;letter-spacing:0;color:#1d1d1f;white-space:nowrap}
.top-actions{display:flex;gap:2px;align-items:center;overflow-x:auto}.top-actions a{font-size:12px;line-height:1;color:#424245;padding:10px 11px;border-radius:999px;white-space:nowrap;transition:background .2s,color .2s}.top-actions a:hover{background:rgba(0,0,0,.05);color:#000}
.wrap{width:min(1120px,calc(100% - 32px));margin:0 auto;padding:calc(var(--nav-h) + 58px) 0 78px}
.hero{display:flex;flex-direction:column;align-items:center;text-align:center;gap:24px;margin:0 auto 34px}
.hero>div:first-child{width:min(880px,100%)}
.kicker{display:inline-flex;align-items:center;gap:8px;min-height:30px;padding:0 13px;border:1px solid rgba(0,0,0,.08);border-radius:999px;background:rgba(255,255,255,.72);color:#424245;font-size:13px;font-weight:600;margin-bottom:18px}
.kicker:before{content:"";width:7px;height:7px;border-radius:50%;background:var(--green)}
h1{font-size:clamp(42px,7vw,86px);line-height:.98;letter-spacing:0;font-weight:800}
.subtitle{margin:22px auto 0;color:#424245;font-size:clamp(19px,2.2vw,28px);line-height:1.2;font-weight:650;max-width:760px}
.switcher{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;width:min(760px,100%)}
.tab{border:1px solid rgba(0,0,0,.08);background:rgba(255,255,255,.76);color:#424245;border-radius:999px;min-width:42px;height:34px;padding:0 13px;font-size:13px;font-weight:700;cursor:pointer;transition:transform .2s,background .2s,color .2s,box-shadow .2s}
.tab:hover{transform:translateY(-1px);background:#fff}
.tab.active{background:var(--blue);color:#fff;border-color:var(--blue);box-shadow:0 10px 24px rgba(0,113,227,.22)}
.demo-shell{background:#fff;border:1px solid rgba(0,0,0,.08);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.demo-head{min-height:64px;padding:16px 20px;border-bottom:1px solid rgba(0,0,0,.08);display:flex;align-items:center;justify-content:space-between;gap:14px;background:var(--surface-soft)}
.demo-title{font-weight:780}.demo-sub{font-size:13px;color:var(--muted);margin-top:2px}.pill{display:inline-flex;align-items:center;border-radius:999px;padding:5px 9px;font-size:12px;font-weight:750;background:rgba(0,113,227,.1);color:var(--blue);white-space:nowrap}.pill.green{background:rgba(36,138,61,.12);color:var(--green)}.pill.orange{background:rgba(191,91,0,.12);color:var(--orange)}.pill.red{background:rgba(201,52,47,.12);color:var(--red)}.pill.purple{background:rgba(124,92,252,.12);color:var(--purple)}
.btn{border:0;border-radius:999px;min-height:40px;padding:0 18px;font-size:14px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;transition:transform .2s,background .2s,box-shadow .2s}.btn:hover{transform:translateY(-1px)}.btn.primary{background:var(--blue);color:#fff}.btn.primary:hover{background:var(--blue-deep);box-shadow:0 10px 24px rgba(0,113,227,.22)}.btn.secondary{background:rgba(0,0,0,.06);color:#1d1d1f}.btn.dark{background:#1d1d1f;color:#fff}
.field{display:grid;gap:7px}.field label{font-size:13px;font-weight:760;color:#424245}.field input,.field textarea,.field select{width:100%;border:1px solid var(--line);border-radius:var(--radius);background:#fff;color:var(--text);font-size:15px;padding:11px 12px;outline:none}.field textarea{min-height:112px;resize:vertical}.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--blue);box-shadow:0 0 0 4px rgba(0,113,227,.12)}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}.stack{display:grid;gap:14px}.card{border:1px solid rgba(0,0,0,.08);border-radius:var(--radius);background:#fff;padding:16px;box-shadow:0 10px 30px rgba(0,0,0,.04)}.soft{background:var(--surface-soft)}.muted{color:var(--muted);font-size:14px}.mini{font-size:13px;color:var(--muted)}.section-label{font-size:12px;font-weight:820;letter-spacing:.02em;color:var(--muted);text-transform:uppercase;margin-bottom:8px}.action-row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}.deliverable{border:1px solid rgba(0,0,0,.08);background:linear-gradient(135deg,var(--surface-soft),#fff);border-radius:var(--radius);padding:14px}.deliverable b{display:block;font-size:14px}.deliverable p{margin-top:4px;color:var(--muted);font-size:13px}.logline{font-size:12px;color:var(--muted)}
.bar{height:10px;background:#e5e5ea;border-radius:999px;overflow:hidden}.bar span{height:100%;display:block;background:var(--blue);border-radius:999px}.table{width:100%;border-collapse:collapse;font-size:13px}.table th,.table td{padding:9px 8px;text-align:left;border-bottom:1px solid rgba(0,0,0,.08);color:#424245}.table th{font-weight:780;color:#1d1d1f}
.notice{margin:18px auto 0;max-width:820px;color:var(--muted);font-size:13px;text-align:center}.footer{padding:28px 16px;text-align:center;color:var(--muted);font-size:13px;border-top:1px solid rgba(0,0,0,.08)}.footer a{color:var(--blue)}

/* 01 image generator */
.commerce{display:grid;grid-template-columns:360px 1fr;min-height:620px}.commerce-aside{background:#fbfbfd;border-right:1px solid rgba(0,0,0,.08);padding:18px;display:grid;align-content:start;gap:14px}.scene-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;padding:18px;background:linear-gradient(135deg,#f7f8fb,#edf3f8)}.image-tile{min-height:210px;border-radius:14px;border:1px solid rgba(0,0,0,.08);background:#fff;overflow:hidden;display:grid;grid-template-rows:1fr auto}.image-art{position:relative;background:linear-gradient(145deg,#f7f7f9,#dfe8ef);display:flex;align-items:center;justify-content:center;min-height:178px}.image-art img{width:100%;height:100%;object-fit:cover;display:block}.image-art.generated:after{content:"AI Generated";position:absolute;left:10px;top:10px;border-radius:999px;background:rgba(255,255,255,.82);backdrop-filter:blur(12px);padding:5px 8px;font-size:11px;font-weight:800;color:#1d1d1f}.product{width:70px;height:126px;border-radius:28px 28px 18px 18px;background:linear-gradient(160deg,#17191f,#575d67);box-shadow:inset -8px 0 12px rgba(255,255,255,.12),0 16px 34px rgba(0,0,0,.18)}.image-art.outdoor{background:linear-gradient(145deg,#dbead9,#f7ecd9)}.image-art.office{background:linear-gradient(145deg,#e9eef8,#fff)}.image-art.detail{background:linear-gradient(145deg,#ece6df,#f9f9f9)}.tile-caption{padding:12px;font-size:13px;font-weight:740;color:#424245}

/* 02 knowledge */
.knowledge{display:grid;grid-template-columns:300px 1fr;min-height:620px}.kb-side{border-right:1px solid rgba(0,0,0,.08);background:#fbfbfd;padding:18px}.doc-item{padding:13px;border:1px solid rgba(0,0,0,.08);border-radius:var(--radius);background:#fff;margin-bottom:10px}.doc-item b{font-size:14px}.doc-item p{font-size:12px;color:var(--muted);margin-top:4px}.kb-main{padding:18px;display:grid;grid-template-rows:1fr auto;gap:14px}.chat-list{display:grid;gap:12px;align-content:start}.bubble{max-width:82%;padding:12px 14px;border-radius:18px;font-size:14px}.bubble.user{justify-self:end;background:var(--blue);color:#fff;border-bottom-right-radius:5px}.bubble.bot{justify-self:start;background:#eef0f5;color:#1d1d1f;border-bottom-left-radius:5px}.citation{border-left:3px solid var(--blue);background:#fbfbfd;padding:10px 12px;border-radius:0 var(--radius) var(--radius) 0;margin-top:8px;font-size:13px;color:#424245}.ask-row{display:grid;grid-template-columns:1fr auto;gap:10px}

/* 03 npc */
.npc{min-height:620px;background:linear-gradient(180deg,#111827,#1f2937);color:#f9fafb;display:grid;grid-template-columns:1fr 340px}.npc-stage{position:relative;padding:28px;display:grid;align-content:end;overflow:hidden}.npc-stage:before{content:"";position:absolute;inset:0;background:radial-gradient(circle at 30% 20%,rgba(124,92,252,.35),transparent 34%),linear-gradient(180deg,transparent,rgba(0,0,0,.45))}.npc-card{position:relative;border:1px solid rgba(255,255,255,.18);background:rgba(17,24,39,.72);backdrop-filter:blur(18px);border-radius:16px;padding:18px;max-width:680px}.npc-name{font-size:22px;font-weight:820}.npc-dialogue{margin-top:12px;font-size:17px;color:#e5e7eb}.choice-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}.choice{border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.08);color:#fff;border-radius:999px;padding:8px 12px;font-size:13px}.npc-panel{background:rgba(0,0,0,.22);border-left:1px solid rgba(255,255,255,.12);padding:18px}.npc-panel .field label{color:#d1d5db}.npc-panel input,.npc-panel textarea,.npc-panel select{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.18);color:#fff}.npc-panel select option{color:#1d1d1f}

/* 04 inspection */
.inspect{display:grid;grid-template-columns:360px 1fr;min-height:620px}.inspect-form{background:#fbfbfd;border-right:1px solid rgba(0,0,0,.08);padding:18px}.score-ring{width:148px;height:148px;border-radius:50%;margin:8px auto 18px;background:conic-gradient(var(--green) 0 78%,#e5e5ea 78% 100%);display:grid;place-items:center}.score-ring span{width:104px;height:104px;border-radius:50%;background:#fff;display:grid;place-items:center;font-size:34px;font-weight:820}.report{padding:18px}.check-row{display:grid;grid-template-columns:auto 1fr auto;gap:10px;align-items:center;padding:12px 0;border-bottom:1px solid rgba(0,0,0,.08)}.check-dot{width:22px;height:22px;border-radius:50%;display:grid;place-items:center;background:rgba(36,138,61,.12);color:var(--green);font-size:13px}.check-dot.warn{background:rgba(191,91,0,.12);color:var(--orange)}.check-dot.bad{background:rgba(201,52,47,.12);color:var(--red)}

/* 05 support */
.support{display:grid;grid-template-columns:300px 1fr 310px;min-height:620px}.inbox{background:#fbfbfd;border-right:1px solid rgba(0,0,0,.08);padding:14px}.ticket{border:1px solid rgba(0,0,0,.08);background:#fff;border-radius:var(--radius);padding:12px;margin-bottom:10px}.ticket.active{border-color:var(--blue);box-shadow:0 0 0 3px rgba(0,113,227,.12)}.ticket b{font-size:14px}.ticket p{font-size:12px;color:var(--muted);margin-top:4px}.support-chat{padding:18px;display:grid;grid-template-rows:1fr auto;gap:14px}.agent-panel{background:#fbfbfd;border-left:1px solid rgba(0,0,0,.08);padding:18px}

/* 06 prompt lab */
.promptlab{display:grid;grid-template-columns:360px 1fr;min-height:620px}.prompt-editor{background:#fbfbfd;border-right:1px solid rgba(0,0,0,.08);padding:18px}.model-grid{padding:18px;display:grid;grid-template-columns:repeat(3,1fr);gap:14px}.model-card{border:1px solid rgba(0,0,0,.08);border-radius:var(--radius);padding:16px;background:#fff}.model-card h3{font-size:18px}.score{font-size:42px;font-weight:840;margin:12px 0 6px}.tokens{margin-top:12px;display:grid;gap:8px}

/* 07 risk */
.risk{display:grid;grid-template-columns:370px 1fr;min-height:620px;background:#f7f8fb}.risk-form{background:#fff;border-right:1px solid rgba(0,0,0,.08);padding:18px}.risk-dash{padding:18px;display:grid;gap:14px}.risk-top{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}.risk-metric{border:1px solid rgba(0,0,0,.08);border-radius:var(--radius);background:#fff;padding:16px}.risk-metric strong{display:block;font-size:30px;line-height:1}.risk-metric span{font-size:13px;color:var(--muted)}.risk-main{display:grid;grid-template-columns:1fr 1fr;gap:14px}.risk-list li{margin-left:18px;color:#424245;font-size:14px;margin-bottom:8px}
@media(max-width:940px){.hero{grid-template-columns:1fr}.switcher{justify-content:flex-start}.commerce,.knowledge,.npc,.inspect,.support,.promptlab,.risk{grid-template-columns:1fr}.commerce-aside,.kb-side,.inspect-form,.prompt-editor,.risk-form,.inbox,.agent-panel,.npc-panel{border-right:0;border-left:0;border-bottom:1px solid rgba(0,0,0,.08)}.support{grid-template-columns:1fr}.scene-grid,.model-grid,.risk-top,.risk-main{grid-template-columns:1fr}.ask-row{grid-template-columns:1fr}.npc{background:#111827}}
</style>
</head>
<body>
<nav class="topbar">
  <div class="topbar-inner">
    <a class="brand" href="index.html">李林豪 · AI 产品经理</a>
    <div class="top-actions">
      <a id="detailLink" href="projects.html">项目详情</a>
      <a href="projects.html">全部项目</a>
    </div>
  </div>
</nav>

<main class="wrap">
  <section class="hero">
    <div>
      <div class="kicker">Interactive Demo</div>
      <h1 id="pageTitle">AI Demo 在线体验</h1>
      <p id="pageSubtitle" class="subtitle">每个项目都有独立的产品界面和交互样式。</p>
    </div>
    <div id="switcher" class="switcher"></div>
  </section>

  <section class="demo-shell">
    <div class="demo-head">
      <div><div id="demoTitle" class="demo-title"></div><div id="demoSub" class="demo-sub"></div></div>
      <span id="demoStatus" class="pill green">Static online demo</span>
    </div>
    <div id="demoRoot"></div>
  </section>

  <p class="notice">这些是可部署到 GitHub Pages 的静态在线体验，用来展示产品流程和交互结构；真实模型推理、文件上传、支付、工单流转等能力需要后端服务/API。</p>
</main>

<footer class="footer">AI 产品经理作品集 · 李林豪 · <a href="index.html">返回简历</a></footer>

<script>
const demoMeta = {
  "01": ["跨境电商AI商品图生成器", "商品卖点解析 + 多场景图片生成工作台"],
  "02": ["AI知识库问答助手", "RAG 问答、来源引用和多轮追问界面"],
  "03": ["游戏NPC智能对话系统", "角色人设、情绪状态和任务钩子"],
  "04": ["AI自动巡检报告系统", "现场巡检、问题评分和整改报告"],
  "05": ["智能客服Agent", "客服收件箱、意图识别和工单处理"],
  "06": ["Prompt测试对比平台", "多模型评测、成本耗时和版本对比"],
  "07": ["金融风控AI助手", "信贷审批、风险指标和解释型建议"]
};

const state = {
  "01": { desc: "轻量化户外保温杯，磨砂黑色，适合露营、徒步和办公室通勤", scene: "生活方式场景", count: 6 },
  "02": { q: "企业版知识库是否支持 PDF 上传和多轮追问？", kb: "企业版产品手册.pdf", recall: 4 },
  "03": { role: "导师", msg: "我刚从北境回来，听说城里最近有奇怪的传闻。", mood: 6 },
  "04": { type: "餐饮门店", issue: "后厨地面有积水，冷柜温度记录缺失，消防通道堆放纸箱。", count: 5 },
  "05": { scene: "电商售后", msg: "我昨天申请退款一直没有处理，订单号 A10293，现在很着急。", emotion: 7 },
  "06": { task: "把客服投诉内容总结为客户问题、情绪等级、建议处理动作。", metric: "格式稳定性", rounds: 5 },
  "07": { company: "年营收8600万，净利润率6%，负债率58%，近一年1次逾期，抵押覆盖率130%，现金流承压。", scene: "授信复核", debt: 58 }
};

const runtime = { current: "01", runs: {}, npcChoice: "继续追问传闻" };
const $ = (id) => document.getElementById(id);
const escapeHtml = (value) => String(value).replace(/[&<>"']/g, (char) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", "\"": "&quot;", "'": "&#39;" }[char]));

function setValue(key, field, value) {
  state[key][field] = value;
}

function runDemo(key) {
  runtime.runs[key] = new Date().toLocaleString("zh-CN", { hour12: false });
  renderDemo(key);
}

function runLabel(key) {
  return runtime.runs[key] ? `已生成 · ${runtime.runs[key]}` : "待生成";
}

function deliverableCard(key, title, detail) {
  return `<div class="deliverable"><b>${title}</b><p>${detail}</p><div class="action-row" style="margin-top:10px"><button class="btn secondary" onclick="downloadDeliverable('${key}')">下载交付物</button><span class="logline">${runLabel(key)}</span></div></div>`;
}

function field(key, name, label, value, type = "text") {
  if (type === "textarea") {
    return `<div class="field"><label>${label}</label><textarea oninput="setValue('${key}','${name}',this.value)">${escapeHtml(value)}</textarea></div>`;
  }
  return `<div class="field"><label>${label}</label><input type="${type}" value="${escapeHtml(value)}" oninput="setValue('${key}','${name}',this.value)"></div>`;
}

function selectField(key, name, label, value, options) {
  return `<div class="field"><label>${label}</label><select onchange="setValue('${key}','${name}',this.value)">${options.map((item) => `<option ${item === value ? "selected" : ""}>${item}</option>`).join("")}</select></div>`;
}

function chooseNpc(choice) {
  runtime.npcChoice = choice;
  runtime.runs["03"] = new Date().toLocaleString("zh-CN", { hour12: false });
  renderDemo("03");
}

function makeDeliverable(key) {
  const generatedAt = runtime.runs[key] || new Date().toLocaleString("zh-CN", { hour12: false });
  if (key === "01") {
    const s = state["01"];
    return {
      name: "ai-commerce-image-brief.txt",
      type: "text/plain",
      body: `跨境电商AI商品图生成器 - 商品图Brief\n生成时间：${generatedAt}\n\n商品描述：${s.desc}\n生成场景：${s.scene}\n生成数量：${s.count}\n\n交付内容：\n1. 白底主图：突出商品轮廓和材质。\n2. 生活方式图：露营、办公室、通勤场景。\n3. 细节图：杯盖、杯身质感、容量标识。\n4. 尺寸说明图：高度、容量、使用卖点。\n\nPrompt模板：premium product photography, ${s.scene}, outdoor bottle, clean lighting, ecommerce hero shot`
    };
  }
  if (key === "02") {
    const s = state["02"];
    return {
      name: "knowledge-qa-answer.txt",
      type: "text/plain",
      body: `AI知识库问答助手 - 回答记录\n生成时间：${generatedAt}\n\n问题：${s.q}\n知识库：${s.kb}\n召回段落：Top ${s.recall}\n\n回答：企业版知识库支持 PDF、Word、TXT、Markdown 等格式上传，并支持多轮追问。回答会附带来源段落，便于人工复核。\n\n引用来源：${s.kb} · 第 3.2 节 · 文档上传与多轮问答能力`
    };
  }
  if (key === "03") {
    const s = state["03"];
    const attitude = Number(s.mood) >= 7 ? "friendly" : Number(s.mood) >= 4 ? "neutral" : "guarded";
    return {
      name: "npc-dialogue-response.json",
      type: "application/json",
      body: JSON.stringify({
        project: "游戏NPC智能对话系统",
        generated_at: generatedAt,
        role: s.role,
        player_input: s.msg,
        selected_action: runtime.npcChoice,
        emotion: attitude,
        dialogue: "北境来的旅人，你问得正是时候。昨夜港口的灯塔熄了三次，银戒商人却说那只是风。",
        quest_hint: "调查失踪商队",
        api_fields: ["dialogue", "emotion", "quest_hint", "relationship_delta"]
      }, null, 2)
    };
  }
  if (key === "04") {
    const s = state["04"];
    const score = Math.max(62, 96 - Number(s.count) * 4);
    return {
      name: "inspection-report.txt",
      type: "text/plain",

function downloadDeliverable(key) {
  if (!runtime.runs[key]) runtime.runs[key] = new Date().toLocaleString("zh-CN", { hour12: false });
  const file = makeDeliverable(key);
  const blob = new Blob([file.body], { type: `${file.type};charset=utf-8` });
  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = file.name;
  document.body.appendChild(link);
  link.click();
  link.remove();
  URL.revokeObjectURL(link.href);
  renderDemo(key);
}

function renderDemo(id) {
  runtime.current = id;
  const meta = demoMeta[id];
  $("pageTitle").textContent = meta[0];
  $("pageSubtitle").textContent = meta[1];
  $("demoTitle").textContent = meta[0];
  $("demoSub").textContent = meta[1];
  $("demoStatus").textContent = runtime.runs[id] ? `已生成 · ${runtime.runs[id]}` : "可在线体验";

  $("detailLink").href = `project_${id}.html`;
  $("demoRoot").innerHTML = renderers[id]();
  renderSwitcher(id);
}

function openDemo(id) {
  history.replaceState(null, "", `demo.html?p=${id}`);
  renderDemo(id);
}
