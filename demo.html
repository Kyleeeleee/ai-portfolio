/* 01 image generator */
.commerce{display:grid;grid-template-columns:360px 1fr;min-height:620px}.commerce-aside{background:#fbfbfd;border-right:1px solid rgba(0,0,0,.08);padding:18px;display:grid;align-content:start;gap:14px}.scene-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;padding:18px;background:linear-gradient(135deg,#f7f8fb,#edf3f8)}.image-tile{min-height:210px;border-radius:14px;border:1px solid rgba(0,0,0,.08);background:#fff;overflow:hidden;display:grid;grid-template-rows:1fr auto}.image-art{position:relative;background:linear-gradient(145deg,#f7f7f9,#dfe8ef);display:flex;align-items:center;justify-content:center}.product{width:70px;height:126px;border-radius:28px 28px 18px 18px;background:linear-gradient(160deg,#17191f,#575d67);box-shadow:inset -8px 0 12px rgba(255,255,255,.12),0 16px 34px rgba(0,0,0,.18)}.image-art.outdoor{background:linear-gradient(145deg,#dbead9,#f7ecd9)}.image-art.office{background:linear-gradient(145deg,#e9eef8,#fff)}.image-art.detail{background:linear-gradient(145deg,#ece6df,#f9f9f9)}.tile-caption{padding:12px;font-size:13px;font-weight:740;color:#424245}

/* 02 knowledge */
.knowledge{display:grid;grid-template-columns:300px 1fr;min-height:620px}.kb-side{border-right:1px solid rgba(0,0,0,.08);background:#fbfbfd;padding:18px}.doc-item{padding:13px;border:1px solid rgba(0,0,0,.08);border-radius:var(--radius);background:#fff;margin-bottom:10px}.doc-item b{font-size:14px}.doc-item p{font-size:12px;color:var(--muted);margin-top:4px}.kb-main{padding:18px;display:grid;grid-template-rows:1fr auto;gap:14px}.chat-list{display:grid;gap:12px;align-content:start}.bubble{max-width:82%;padding:12px 14px;border-radius:18px;font-size:14px}.bubble.user{justify-self:end;background:var(--blue);color:#fff;border-bottom-right-radius:5px}.bubble.bot{justify-self:start;background:#eef0f5;color:#1d1d1f;border-bottom-left-radius:5px}.citation{border-left:3px solid var(--blue);background:#fbfbfd;padding:10px 12px;border-radius:0 var(--radius) var(--radius) 0;margin-top:8px;font-size:13px;color:#424245}.ask-row{display:grid;grid-template-columns:1fr auto;gap:10px}

/* 03 npc */
.npc{min-height:620px;background:linear-gradient(180deg,#111827,#1f2937);color:#f9fafb;display:grid;grid-template-columns:1fr 340px}.npc-stage{position:relative;padding:28px;display:grid;align-content:end;overflow:hidden}.npc-stage:before{content:"";position:absolute;inset:0;background:radial-gradient(circle at 30% 20%,rgba(124,92,252,.35),transparent 34%),linear-gradient(180deg,transparent,rgba(0,0,0,.45))}.npc-card{position:relative;border:1px solid rgba(255,255,255,.18);background:rgba(17,24,39,.72);backdrop-filter:blur(18px);border-radius:16px;padding:18px;max-width:680px}.npc-name{font-size:22px;font-weight:820}.npc-dialogue{margin-top:12px;font-size:17px;color:#e5e7eb}.choice-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}.choice{border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.08);color:#fff;border-radius:999px;padding:8px 12px;font-size:13px}.npc-panel{background:rgba(0,0,0,.22);border-left:1px solid rgba(255,255,255,.12);padding:18px}.npc-panel .field label{color:#d1d5db}.npc-panel input,.npc-panel textarea,.npc-panel select{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.18);color:#fff}.npc-panel select option{color:#1d1d1f}

/* 06 prompt lab */

.risk{display:grid;grid-template-columns:370px 1fr;min-height:620px;background:#f7f8fb}.risk-form{background:#fff;border-right:1px solid rgba(0,0,0,.08);padding:18px}.risk-dash{padding:18px;display:grid;gap:14px}.risk-top{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}.risk-metric{border:1px solid rgba(0,0,0,.08);border-radius:var(--radius);background:#fff;padding:16px}.risk-metric strong{display:block;font-size:30px;line-height:1}.risk-metric span{font-size:13px;color:var(--muted)}.risk-main{display:grid;grid-template-columns:1fr 1fr;gap:14px}.risk-list li{margin-left:18px;color:#424245;font-size:14px;margin-bottom:8px}
@media(max-width:940px){.hero{grid-template-columns:1fr}.switcher{justify-content:flex-start}.commerce,.knowledge,.npc,.inspect,.support,.promptlab,.risk{grid-template-columns:1fr}.commerce-aside,.kb-side,.inspect-form,.prompt-editor,.risk-form,.inbox,.agent-panel,.npc-panel{border-right:0;border-left:0;border-bottom:1px solid rgba(0,0,0,.08)}.support{grid-template-columns:1fr}.scene-grid,.model-grid,.risk-top,.risk-main{grid-template-columns:1fr}.ask-row{grid-template-columns:1fr}.npc{background:#111827}}

const $ = (id) => document.getElementById(id);
const escapeHtml = (value) => String(value).replace(/[&<>"']/g, (char) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", "\"": "&quot;", "'": "&#39;" }[char]));

function setValue(key, field, value) {
  state[key][field] = value;
}

function applySample(key, index) {
  Object.assign(state[key], sampleSets[key][index].values);
  runtime.runs[key] = null;
  renderDemo(key);
}

function runDemo(key) {
  runtime.runs[key] = new Date().toLocaleString("zh-CN", { hour12: false });

}

function runLabel(key) {
  return runtime.runs[key] ? `已生成 · ${runtime.runs[key]}` : "待生成";
}

function deliverableCard(key, title, detail) {
  return `<div class="deliverable"><b>${title}</b><p>${detail}</p><div class="action-row" style="margin-top:10px"><button class="btn secondary" onclick="downloadDeliverable('${key}')">下载交付物</button><span class="logline">${runLabel(key)}</span></div></div>`;
}

function sampleBank(key) {
  return `<div class="sample-bank"><div class="section-label">样例素材</div>${sampleSets[key].map((item, index) => `<button class="sample-chip" onclick="applySample('${key}',${index})"><b>${item.label}</b><span>${item.summary}</span></button>`).join("")}</div>`;
}

function field(key, name, label, value, type = "text") {
  if (type === "textarea") {
    return `<div class="field"><label>${label}</label><textarea oninput="setValue('${key}','${name}',this.value)">${escapeHtml(value)}</textarea></div>`;
  }
  return `<div class="field"><label>${label}</label><input type="${type}" value="${escapeHtml(value)}" oninput="setValue('${key}','${name}',this.value)"></div>`;
}

function selectField(key, name, label, value, options) {
  return `<div class="field"><label>${label}</label><select onchange="setValue('${key}','${name}',this.value)">${options.map((item) => `<option ${item === value ? "selected" : ""}>${item}</option>`).join("")}</select></div>`;
}

function downloadDeliverable(key) {
  if (!runtime.runs[key]) runtime.runs[key] = new Date().toLocaleString("zh-CN", { hour12: false });
  const file = makeDeliverable(key);
  const blob = new Blob([file.body], { type: `${file.type};charset=utf-8` });
  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = file.name;
  document.body.appendChild(link);
  link.click();
  link.remove();
  URL.revokeObjectURL(link.href);
  renderDemo(key);
}

      <div class="risk-main">
        <div class="card"><div class="section-label">Risk Level</div><span class="pill ${risk[1]}">${risk[0]}</span><div class="bar" style="margin-top:18px"><span style="width:${debt}%;background:${debt >= 70 ? "var(--red)" : debt >= 50 ? "var(--orange)" : "var(--green)"}"></span></div><p class="muted" style="margin-top:12px">综合考虑负债、现金流、逾期记录和抵押覆盖率。</p></div>
        <div class="card"><div class="section-label">Explainability</div><ul class="risk-list"><li>现金流承压：触发财报文本风险标签。</li><li>近一年逾期 1 次：进入复核规则。</li><li>抵押覆盖率 130%：提供一定风险缓释。</li><li>建议降低授信额度并补充流水证明。</li></ul></div>
      </div>
      <div class="card soft"><table class="table"><thead><tr><th>指标</th><th>结果</th><th>规则</th></tr></thead><tbody><tr><td>营收规模</td><td>8600万</td><td>达标</td></tr><tr><td>净利润率</td><td>6%</td><td>观察</td></tr><tr><td>抵押覆盖</td><td>130%</td><td>正向</td></tr></tbody></table></div>
      ${deliverableCard("07", "交付物", "授信审批建议、风险解释、命中规则和复核动作。")}
    </section>
  </div>`;
}

const renderers = { "01": renderCommerce, "02": renderKnowledge, "03": renderNpc, "04": renderInspection, "05": renderSupport, "06": renderPromptLab, "07": renderRisk };

function renderSwitcher(active) {
  $("switcher").innerHTML = Object.keys(demoMeta).map((id) => `<button class="tab ${id === active ? "active" : ""}" onclick="openDemo('${id}')"><span>${demoMeta[id][2]}</span><span>${demoMeta[id][3]}</span></button>`).join("");
}

function renderDemo(id) {
  runtime.current = id;
  const meta = demoMeta[id];
  $("pageTitle").textContent = meta[0];
  $("pageSubtitle").textContent = meta[1];
  $("demoTitle").textContent = meta[0];
  $("demoSub").textContent = meta[1];
  $("demoStatus").textContent = runtime.runs[id] ? `已生成 · ${runtime.runs[id]}` : "可在线体验";
  $("demoStatus").className = runtime.runs[id] ? "pill green" : "pill";
  $("detailLink").href = `project_${id}.html`;
  $("demoRoot").innerHTML = renderers[id]();
  renderSwitcher(id);
}

function openDemo(id) {
  history.replaceState(null, "", `demo.html?p=${id}`);
  renderDemo(id);
}

const id = new URLSearchParams(location.search).get("p");
openDemo(demoMeta[id] ? id : "01");
</script>
</body>
</html>
