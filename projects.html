*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{min-height:100vh;padding-top:var(--nav-h);background:linear-gradient(180deg,#fbfbfd 0%,#f5f5f7 42%,#f2f4f7 100%);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Segoe UI","PingFang SC",sans-serif;line-height:1.5;-webkit-font-smoothing:antialiased}

.page-shell{width:min(1180px,calc(100% - 48px));margin:0 auto}
.hero{display:grid;grid-template-columns:minmax(0,1fr) minmax(280px,360px);gap:34px;align-items:end;padding:64px 0 28px}

.hero-copy{max-width:660px;margin-top:18px;color:var(--muted);font-size:17px;line-height:1.75}
.hero-panel{display:grid;gap:12px;padding:18px;border:1px solid var(--line);border-radius:var(--radius);background:rgba(255,255,255,.76);box-shadow:0 8px 28px rgba(0,0,0,.04);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px)}

.hero-stat span{display:block;margin-top:5px;color:var(--muted);font-size:12px}
.showcase-head{display:flex;align-items:flex-end;justify-content:space-between;gap:18px;margin:10px auto 12px}
.showcase-title h2{font-size:22px;line-height:1.2}
.showcase-title p{margin-top:6px;color:var(--muted);font-size:14px}
.carousel-controls{display:flex;align-items:center;gap:10px}
.carousel-count{min-width:92px;color:var(--muted);font-size:13px;text-align:center}
.carousel-button{display:grid;place-items:center;width:42px;height:42px;padding:0;border:1px solid var(--line);border-radius:50%;background:#fff;color:#1d1d1f;font-size:0;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.05);transition:background .2s,opacity .2s,transform .2s}
.carousel-button::before{content:"";display:block;width:9px;height:9px;border-top:2px solid currentColor;border-right:2px solid currentColor}
.carousel-button:first-child::before{transform:rotate(-135deg)}
.carousel-button:last-child::before{transform:rotate(45deg)}
.carousel-button:hover:not(:disabled){background:#f5f5f7;transform:translateY(-1px)}
.carousel-button:disabled{cursor:default;opacity:.34;box-shadow:none}
.carousel-viewport{overflow-x:auto;overflow-y:hidden;margin:0;padding:18px max(24px,calc((100vw - 1180px)/2)) 42px;scroll-padding-inline:max(24px,calc((100vw - 1180px)/2));scroll-snap-type:x mandatory;scrollbar-width:none;overscroll-behavior-inline:contain;cursor:grab;touch-action:pan-x pan-y}
.carousel-viewport::-webkit-scrollbar{display:none}
.carousel-viewport.is-dragging{cursor:grabbing;scroll-snap-type:none;user-select:none}
.project-track{display:flex;width:max-content;gap:18px}
.card{--accent:#2563eb;--accent-rgb:37,99,235;position:relative;display:flex;flex:0 0 372px;flex-direction:column;height:500px;overflow:hidden;border:1px solid var(--line);border-radius:var(--radius);background:#fff;color:var(--ink);scroll-snap-align:start;box-shadow:0 1px 2px rgba(0,0,0,.03);-webkit-user-drag:none;transform:translateZ(0);transition:transform .32s cubic-bezier(.2,.8,.2,1),border-color .25s,box-shadow .25s}
.card::before{content:"";position:absolute;inset:0 0 auto;height:4px;background:linear-gradient(90deg,var(--accent),rgba(var(--accent-rgb),.28));z-index:2}
.card:hover{border-color:rgba(var(--accent-rgb),.34);box-shadow:0 22px 54px rgba(var(--accent-rgb),.16)}
.card:focus-visible,.carousel-button:focus-visible,.carousel-viewport:focus-visible{outline:3px solid rgba(0,113,227,.28);outline-offset:3px}
.card-visual{position:relative;display:grid;align-content:space-between;height:150px;margin:18px 18px 0;padding:16px;overflow:hidden;border:1px solid rgba(var(--accent-rgb),.16);border-radius:var(--radius);background:linear-gradient(135deg,rgba(var(--accent-rgb),.13),rgba(var(--accent-rgb),.04) 52%,#fff)}
.card-visual::before{content:"";position:absolute;inset:18px 18px auto auto;width:96px;height:96px;border:1px solid rgba(var(--accent-rgb),.18);border-radius:50%;background:rgba(255,255,255,.48)}
.card-visual::after{content:"";position:absolute;right:-24px;bottom:-30px;width:128px;height:128px;border-radius:50%;background:rgba(var(--accent-rgb),.12)}
.mark{position:relative;z-index:1;display:grid;place-items:center;width:58px;height:58px;border-radius:var(--radius);background:var(--accent);color:#fff;font-size:18px;font-weight:780;letter-spacing:0;box-shadow:0 14px 28px rgba(var(--accent-rgb),.18)}
.flow-line{position:relative;z-index:1;display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}
.flow-node{position:relative;min-height:38px;padding:8px 9px;border:1px solid rgba(var(--accent-rgb),.16);border-radius:var(--radius);background:rgba(255,255,255,.76);color:#303846;font-size:12px;font-weight:680;line-height:1.25;box-shadow:0 8px 18px rgba(0,0,0,.04)}
.flow-node:not(:last-child)::after{content:"";position:absolute;top:50%;right:-10px;width:10px;height:1px;background:rgba(var(--accent-rgb),.42)}
.card-body{display:flex;flex:1;flex-direction:column;padding:18px}
.meta-row{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:12px}
.index{display:inline-flex;align-items:center;gap:8px;color:var(--accent);font-size:12px;font-weight:760;letter-spacing:0}
.index::before{content:"";width:8px;height:8px;border-radius:50%;background:var(--accent)}
.domain{display:inline-flex;align-items:center;min-height:26px;padding:0 10px;border-radius:999px;background:rgba(var(--accent-rgb),.08);color:var(--accent);font-size:12px;font-weight:680;white-space:nowrap}
.card h3{font-size:22px;font-weight:760;line-height:1.18;letter-spacing:0}
.subtitle{display:-webkit-box;min-height:50px;margin-top:9px;overflow:hidden;color:var(--muted);font-size:14px;line-height:1.65;-webkit-box-orient:vertical;-webkit-line-clamp:2}
.metrics{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;margin-top:16px}
.metric{min-height:58px;padding:10px;border:1px solid rgba(var(--accent-rgb),.14);border-radius:var(--radius);background:rgba(var(--accent-rgb),.06)}
.metric b{display:block;color:var(--accent);font-size:14px;line-height:1.2}
.metric span{display:block;margin-top:4px;color:#5d6572;font-size:12px;line-height:1.25}
.tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:14px}
.tag{display:inline-flex;align-items:center;min-height:25px;padding:0 10px;border-radius:999px;background:#f5f5f7;color:#3f4652;font-size:12px;font-weight:600;white-space:nowrap}
.card-footer{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:auto;padding-top:18px}
.open-label{color:var(--accent);font-size:13px;font-weight:760}
.arrow{display:grid;place-items:center;width:34px;height:34px;border-radius:50%;background:rgba(var(--accent-rgb),.08);color:var(--accent);font-size:18px;transition:transform .25s}
.progress-wrap{padding-bottom:10px}
.progress-track{height:3px;overflow:hidden;border-radius:999px;background:#dedee3}
.progress-bar{width:0;height:100%;border-radius:inherit;background:#1d1d1f;transition:width .2s}
.footer{text-align:center;padding:38px 2rem 46px;color:var(--muted);font-size:13px;border-top:1px solid rgba(0,0,0,.08);margin-top:18px}
.footer a{color:#2563eb}
.p13{--accent:#2563eb;--accent-rgb:37,99,235}
.p14{--accent:#d8642a;--accent-rgb:216,100,42}
.p01{--accent:#7c5cfc;--accent-rgb:124,92,252}

.p07{--accent:#008c95;--accent-rgb:0,140,149}
.p08{--accent:#a53aa1;--accent-rgb:165,58,161}
.p10{--accent:#b87500;--accent-rgb:184,117,0}
.p11{--accent:#4f6f7f;--accent-rgb:79,111,127}
.p12{--accent:#667a4a;--accent-rgb:102,122,74}
@media(hover:hover) and (pointer:fine){

@media(max-width:640px){

  .page-shell{width:calc(100% - 36px)}.hero{padding:36px 0 22px}.hero h1{font-size:42px}.hero-copy{font-size:15px}.hero-stats{grid-template-columns:1fr}

  .card{flex-basis:calc(100vw - 52px);height:508px}.card h3{font-size:22px}.metrics{grid-template-columns:1fr 1fr}.metric:last-child{grid-column:1/-1}
  .card-visual{height:148px;padding:14px}.flow-line{gap:7px}.flow-node{font-size:11px;padding:8px 7px}
}
@media(prefers-reduced-motion:reduce){html{scroll-behavior:auto}.card,.card-visual,.arrow,.carousel-button,.progress-bar{transition:none}}
</style>

let pressedCard=null;

function cardStep(){
  if(projectCards.length<2)return projectCards[0]?.getBoundingClientRect().width||0;
  return projectCards[1].offsetLeft-projectCards[0].offsetLeft;
}

function activeIndex(){
  const paddingStart=parseFloat(getComputedStyle(carousel).paddingLeft)||0;
  const target=carousel.scrollLeft+paddingStart+20;
  let bestIndex=0;
  let bestDistance=Infinity;
  projectCards.forEach((card,index)=>{
    const distance=Math.abs(card.offsetLeft-target);
    if(distance<bestDistance){bestDistance=distance;bestIndex=index;}
  });
  return bestIndex;
}

function visibleRange(){
  const viewportRect=carousel.getBoundingClientRect();
  const visibleIndexes=projectCards
    .map((card,index)=>({index,rect:card.getBoundingClientRect()}))
    .filter(({rect})=>rect.right>viewportRect.left+8&&rect.left<viewportRect.right-8)
    .map(({index})=>index);
  if(!visibleIndexes.length){
    const index=activeIndex();
    return {start:index,end:index};
  }
  return {start:visibleIndexes[0],end:visibleIndexes[visibleIndexes.length-1]};
}

function updateCarousel(){
  const maxScroll=Math.max(1,carousel.scrollWidth-carousel.clientWidth);
  const range=visibleRange();
  prevButton.disabled=carousel.scrollLeft<=2;
  nextButton.disabled=carousel.scrollLeft>=maxScroll-2;
  const total=String(projectCards.length).padStart(2,"0");
  const start=String(range.start+1).padStart(2,"0");
  const end=String(range.end+1).padStart(2,"0");
  countLabel.textContent=range.start===range.end?`${start} / ${total}`:`${start}-${end} / ${total}`;
  progressBar.style.width=`${Math.min(100,Math.max(0,(carousel.scrollLeft/maxScroll)*100))}%`;
}

function moveCarousel(direction){
  carousel.scrollBy({left:direction*cardStep(),behavior:"smooth"});
}

prevButton.addEventListener("click",()=>moveCarousel(-1));
nextButton.addEventListener("click",()=>moveCarousel(1));
carousel.addEventListener("keydown",event=>{
  if(event.key==="ArrowLeft"){event.preventDefault();moveCarousel(-1);}
  if(event.key==="ArrowRight"){event.preventDefault();moveCarousel(1);}
});
carousel.addEventListener("scroll",()=>{
  cancelAnimationFrame(scrollFrame);
  scrollFrame=requestAnimationFrame(updateCarousel);
},{passive:true});
carousel.addEventListener("pointerdown",event=>{
  if(event.pointerType!=="mouse"||event.button!==0)return;
  dragStartX=event.clientX;
  dragStartScroll=carousel.scrollLeft;
  dragDistance=0;
  pressedCard=event.target.closest(".card");
  carousel.classList.add("is-dragging");
  carousel.setPointerCapture(event.pointerId);
});
carousel.addEventListener("dragstart",event=>event.preventDefault());
carousel.addEventListener("pointermove",event=>{
  if(!carousel.classList.contains("is-dragging"))return;
  dragDistance=event.clientX-dragStartX;
  carousel.scrollLeft=dragStartScroll-dragDistance;
});
function stopDragging(event){
  if(!carousel.classList.contains("is-dragging"))return;
  const shouldOpen=event.type==="pointerup"&&Math.abs(dragDistance)<=6&&pressedCard;
  carousel.classList.remove("is-dragging");
  if(carousel.hasPointerCapture(event.pointerId))carousel.releasePointerCapture(event.pointerId);
  if(shouldOpen)pressedCard.click();
  pressedCard=null;
}
carousel.addEventListener("pointerup",stopDragging);
carousel.addEventListener("pointercancel",stopDragging);
carousel.addEventListener("click",event=>{
  if(Math.abs(dragDistance)>6){event.preventDefault();event.stopPropagation();dragDistance=0;}
},true);
window.addEventListener("resize",updateCarousel);
updateCarousel();
</script>
